# rules/network.yaml
# Rules keyed on proven capabilities, not guesses

- id: ssh_weak_crypto_detected
  description: SSH weak cryptography detected
  triggers:
    - field: "capability"
      match_type: "equals"
      value: "weak_crypto"
    - field: "details.service"
      match_type: "equals"
      value: "ssh"
  action:
    finding_id: SSH_WEAK_CRYPTO
    technique: Cryptographic Attack
    impact: Session Interception
    tool_to_run: ssh_enum

- id: ssh_password_auth_enabled
  description: SSH allows password-based authentication
  when:
    finding_type: ssh_auth
    contains: password
    service: ssh
  then:
    finding_id: SSH_PASSWORD_AUTH
    technique: Password Brute Force
    impact: Remote Shell Access
    tool_to_run: ssh_enum

- id: ssh_root_login_allowed
  description: SSH permits direct root login
  when:
    finding_type: ssh_config
    contains: permitrootlogin yes
    service: ssh
  then:
    finding_id: SSH_ROOT_LOGIN
    technique: Direct Privileged Authentication
    impact: Immediate Root Access

- id: ssh_weak_kex_or_cipher
  description: SSH supports weak key exchange or encryption algorithms
  when:
    finding_type: crypto_weakness
    service: ssh
  then:
    finding_id: SSH_WEAK_CRYPTO
    technique: Cryptographic Downgrade
    impact: Session Decryption or MITM

- id: telnet_service_exposed
  description: Telnet service exposed with cleartext authentication
  when:
    finding_type: open_port
    service: telnet
    port: 23
  then:
    finding_id: TELNET_EXPOSED
    technique: Cleartext Credential Sniffing
    impact: Credential Disclosure

- id: ftp_service_exposed
