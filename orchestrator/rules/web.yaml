# Rules for triggering scans based on proven capabilities.
# Only trigger when capability is confirmed, not just on port/service.

- rule_name: "Trigger Nikto on proven web exposure"
  source_tool: "nmap"
  triggers:
    - field: "capability"
      match_type: "equals"
      value: "web_exposed"
  action:
    tool_to_run: "nikto"
    target_type: "url_of_finding"
    technique: "Web Surface Enumeration"
    impact: "Web Attack Surface Mapping"

- rule_name: "Trigger WPScan on WordPress Sites"
  source_tool: "whatweb"
  triggers:
    - field: "finding_type"
      match_type: "equals"
      value: "technology"
    - field: "finding_value"
      match_type: "equals"
      value: "WordPress"
  action:
    tool_to_run: "wpscan"
    target_type: "url_of_finding"
    technique: "CMS Enumeration"
    impact: "WordPress Vulnerability Discovery"

- rule_name: "Trigger JoomScan on Joomla Sites"
  source_tool: "whatweb"
  triggers:
    - field: "finding_type"
      match_type: "equals"
      value: "technology"
    - field: "finding_value"
      match_type: "equals"
      value: "Joomla"
  action:
    tool_to_run: "joomscan" # You would add this tool to registry.py
    target_type: "url_of_finding"

