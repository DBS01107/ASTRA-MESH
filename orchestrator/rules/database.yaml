# rules/database.yaml

- id: database_port_exposed
  description: Database service port exposed to untrusted network
  when:
    finding_type: open_port
    severity: high
  then:
    finding_id: DB_PORT_EXPOSED
    technique: Direct Database Targeting
    impact: Bypass of Application-Layer Controls

- id: mysql_exposed_no_tls
  description: MySQL service exposed without enforced TLS
  when:
    finding_type: crypto_weakness
    service: mysql
  then:
    finding_id: MYSQL_NO_TLS
    technique: Credential Sniffing
    impact: Database Credential Compromise

- id: mysql_weak_auth
  description: MySQL uses weak or legacy authentication plugin
  when:
    finding_type: db_auth
    service: mysql
    contains: mysql_old_password
  then:
    finding_id: MYSQL_WEAK_AUTH
    technique: Authentication Downgrade
    impact: Offline Password Cracking

- id: postgres_trust_auth
  description: PostgreSQL configured with trust authentication
  when:
    finding_type: db_auth
    service: postgresql
    contains: trust
  then:
    finding_id: POSTGRES_TRUST
    technique: Authentication Bypass
    impact: Unrestricted Database Access

- id: mssql_exposed
  description: Microsoft SQL Server exposed externally
  when:
    finding_type: open_port
    service: mssql
    port: 1433
  then:
    finding_id: MSSQL_EXPOSED
    technique: Credential Brute Force
    impact: Database-Level Access

- id: mssql_xp_cmdshell_enabled
  description: xp_cmdshell enabled on SQL Server
  when:
    finding_type: db_feature
    service: mssql
    contains: xp_cmdshell
  then:
    finding_id: MSSQL_CMD_SHELL
    technique: Command Execution via Database
    impact: Operating System Command Execution

- id: oracle_listener_exposed
  description: Oracle TNS listener exposed
  when:
    finding_type: open_port
    service: oracle
    port: 1521
  then:
    finding_id: ORACLE_LISTENER
    technique: Listener Abuse
    impact: SID Enumeration and Unauthorized Access

- id: oracle_default_accounts
  description: Oracle default accounts enabled
  when:
    finding_type: default_creds
    service: oracle
  then:
    finding_id: ORACLE_DEFAULT_CREDS
    technique: Default Credential Abuse
    impact: DBA-Level Access

- id: mongodb_no_auth
  description: MongoDB accessible without authentication
  when:
    finding_type: auth_policy
    service: mongodb
    contains: no auth
  then:
    finding_id: MONGO_NO_AUTH
    technique: Unauthenticated Database Access
    impact: Full Database Compromise

- id: mongodb_bind_all
  description: MongoDB bound to all network interfaces
  when:
    finding_type: db_config
    service: mongodb
    contains: 0.0.0.0
  then:
    finding_id: MONGO_BIND_ALL
    technique: Expanded Attack Surface
    impact: Remote Unauthorized Access

- id: redis_exposed_no_auth
  description: Redis exposed without authentication
  when:
    finding_type: auth_policy
    service: redis
    contains: no auth
  then:
    finding_id: REDIS_NO_AUTH
    technique: In-Memory Datastore Abuse
    impact: Remote Code Execution via Config Injection

- id: redis_writeable_dir
  description: Redis allows writing to filesystem
  when:
    finding_type: db_feature
    service: redis
    contains: dir writable
  then:
    finding_id: REDIS_FS_WRITE
    technique: Arbitrary File Write
    impact: Web Shell or SSH Key Injection

- id: elasticsearch_no_auth
  description: Elasticsearch accessible without authentication
  when:
    finding_type: auth_policy
    service: elasticsearch
    contains: no auth
  then:
    finding_id: ELASTIC_NO_AUTH
    technique: Index Enumeration and Dump
    impact: Sensitive Data Exfiltration

- id: elasticsearch_scripting_enabled
  description: Elasticsearch dynamic scripting enabled
  when:
    finding_type: db_feature
    service: elasticsearch
    contains: scripting
  then:
    finding_id: ELASTIC_SCRIPTING
    technique: Script Injection
    impact: Remote Code Execution

- id: cassandra_exposed
  description: Cassandra database exposed externally
  when:
    finding_type: open_port
    service: cassandra
  then:
    finding_id: CASSANDRA_EXPOSED
    technique: Unauthorized Database Access
    impact: Full Keyspace Disclosure

- id: cassandra_default_creds
  description: Cassandra default credentials enabled
  when:
    finding_type: default_creds
    service: cassandra
  then:
    finding_id: CASSANDRA_DEFAULT_CREDS
    technique: Default Credential Abuse
    impact: Administrative Database Access

- id: sql_injection_indicator
  description: Indicators of SQL injection in application traffic
  when:
    finding_type: sqli
    severity: high
  then:
    finding_id: SQL_INJECTION
    technique: Database Injection
    impact: Arbitrary Query Execution
    tool_to_run: sqlmap

- id: blind_sqli_detected
  description: Blind SQL injection behavior detected
  when:
    finding_type: sqli
    contains: blind
  then:
    finding_id: BLIND_SQLI
    technique: Inference-Based Injection
    impact: Stealthy Data Extraction

- id: db_backup_exposed
  description: Database backup files exposed
  when:
    finding_type: exposed_file
    severity: high
  then:
    finding_id: DB_BACKUP
    technique: Offline Data Analysis
    impact: Full Database Disclosure

- id: db_version_disclosure
  description: Database version disclosed in responses
  when:
    finding_type: banner_disclosure
    severity: low
  then:
    finding_id: DB_VERSION
    technique: Exploit Matching
    impact: Targeted Database Exploitation

- id: excessive_db_privileges
  description: Application user has excessive database privileges
  when:
    finding_type: db_privilege
    severity: high
  then:
    finding_id: DB_PRIV_ESC
    technique: Privilege Escalation via Database
    impact: Full Database Control

